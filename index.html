<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>6-7 Clicker</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #1a1a2e;
      --surface: #16213e;
      --accent: #7F77DD;
      --accent-dark: #534AB7;
      --text: #ffffff;
      --text-muted: rgba(255,255,255,0.55);
      --badge-bg: rgba(127,119,221,0.18);
      --badge-text: #c4bfff;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow: hidden;
      touch-action: manipulation;
    }

    #app {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      height: 100vh;
      padding: 2rem 1rem 1.5rem;
    }

    /* TOP */
    .top {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    #counter {
      font-size: 56px;
      font-weight: 700;
      letter-spacing: -2px;
      line-height: 1;
    }
    #label { font-size: 13px; color: var(--text-muted); }
    #streak { font-size: 12px; color: var(--text-muted); margin-top: 6px; min-height: 18px; }

    /* ACHIEVEMENT */
    #achievement {
      min-height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .ach-badge {
      background: var(--badge-bg);
      color: var(--badge-text);
      border-radius: 24px;
      padding: 8px 20px;
      font-size: 14px;
      font-weight: 600;
      animation: popIn 0.25s ease;
      text-align: center;
    }
    @keyframes popIn {
      from { transform: scale(0.6); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }

    /* BUTTON */
    .btn-wrap {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #btn {
      width: 200px;
      height: 200px;
      border-radius: 50%;
      border: none;
      background: var(--accent);
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      -webkit-tap-highlight-color: transparent;
      position: relative;
      z-index: 1;
    }
    #btn:active { transform: scale(0.9); }
    #btn.bounce { animation: bounce 0.18s ease; }
    @keyframes bounce {
      0%   { transform: scale(1); }
      35%  { transform: scale(0.87) rotate(-5deg); }
      70%  { transform: scale(1.08) rotate(3deg); }
      100% { transform: scale(1) rotate(0deg); }
    }
    #btn-text { font-size: 54px; font-weight: 700; color: #fff; line-height: 1; }
    #hands {
      font-size: 24px;
      margin-top: 4px;
      animation: sway 0.7s infinite alternate ease-in-out;
    }
    @keyframes sway {
      from { transform: rotate(-14deg); }
      to   { transform: rotate(14deg); }
    }

    /* RIPPLE */
    .ripple {
      position: absolute;
      border-radius: 50%;
      border: 2px solid var(--accent);
      width: 200px;
      height: 200px;
      animation: ripple 0.6s ease-out forwards;
      pointer-events: none;
    }
    @keyframes ripple {
      from { transform: scale(1); opacity: 0.7; }
      to   { transform: scale(1.8); opacity: 0; }
    }

    /* FLOATS */
    #floats { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 99; }
    .float {
      position: absolute;
      font-size: 18px;
      font-weight: 700;
      color: var(--accent);
      pointer-events: none;
      animation: floatUp 1s ease forwards;
    }
    @keyframes floatUp {
      from { opacity: 1; transform: translateY(0) scale(1); }
      to   { opacity: 0; transform: translateY(-100px) scale(1.3); }
    }

    /* BOTTOM */
    .bottom {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      width: 100%;
    }
    .stats-row {
      display: flex;
      gap: 12px;
      width: 100%;
      max-width: 320px;
    }
    .stat-card {
      flex: 1;
      background: var(--surface);
      border-radius: 12px;
      padding: 10px 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }
    .stat-val { font-size: 18px; font-weight: 700; }
    .stat-lbl { font-size: 11px; color: var(--text-muted); }

    .vol-row {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      color: var(--text-muted);
    }
    .vol-row input[type=range] {
      width: 100px;
      accent-color: var(--accent);
    }
    #mute-btn {
      background: none; border: none; cursor: pointer;
      font-size: 18px; line-height: 1;
    }
  </style>
</head>
<body>
<div id="floats"></div>
<div id="app">

  <div class="top">
    <div id="counter">0</div>
    <div id="label">кліків</div>
    <div id="streak">до першого 67: 67</div>
  </div>

  <div id="achievement"></div>

  <div class="btn-wrap" id="btn-wrap">
    <button id="btn" ontouchstart="handleClick(event)" onclick="handleClick(event)">
      <div id="btn-text">6-7</div>
      <div id="hands">🤲</div>
    </button>
  </div>

  <div class="bottom">
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-val" id="best-streak">0</div>
        <div class="stat-lbl">макс. комбо</div>
      </div>
      <div class="stat-card">
        <div class="stat-val" id="combo-count">0</div>
        <div class="stat-lbl">разів 67</div>
      </div>
      <div class="stat-card">
        <div class="stat-val" id="cps">0</div>
        <div class="stat-lbl">кл/сек</div>
      </div>
    </div>
    <div class="vol-row">
      <button id="mute-btn" onclick="toggleMute()">🔊</button>
      <input type="range" id="vol" min="0" max="1" step="0.05" value="0.5" oninput="setVol(this.value)">
    </div>
  </div>

</div>

<script>
  // --- Telegram WebApp init ---
  const tg = window.Telegram && window.Telegram.WebApp;
  if (tg) {
    tg.ready();
    tg.expand();
  }

  // --- State ---
  let specialSound = new Audio('videoplayback.m4a');
  specialSound.volume = 0.7;
  let count = 0;
  let comboCount = 0;
  let bestStreak = 0;
  let currentStreak = 0;
  let lastClickTime = 0;
  let rapidCount = 0;
  let muted = false;
  let masterVol = 0.5;
  let audioCtx = null;
  let touchHandled = false;

  // CPS tracking
  let clickTimes = [];

  // Load saved data
  try {
    const saved = JSON.parse(localStorage.getItem('67clicker') || '{}');
    count = saved.count || 0;
    comboCount = saved.comboCount || 0;
    bestStreak = saved.bestStreak || 0;
    document.getElementById('counter').textContent = count;
    document.getElementById('combo-count').textContent = comboCount;
    document.getElementById('best-streak').textContent = bestStreak;
    updateStreak();
  } catch(e) {}

  function save() {
    try { localStorage.setItem('67clicker', JSON.stringify({ count, comboCount, bestStreak })); } catch(e) {}
  }

  // --- Audio ---
  function getCtx() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    return audioCtx;
  }

  function playClick(n) {
    if (muted) return;
    const ctx = getCtx();
    if (n % 67 === 0 && n > 0) { 
  if (!muted) {
    specialSound.currentTime = 0;
    specialSound.volume = masterVol; // чтобы работал твой ползунок
    specialSound.play();
  }
  return; 
}
    const osc = ctx.createOscillator();
    const g = ctx.createGain();
    osc.connect(g); g.connect(ctx.destination);
    const base = 200 + (n % 16) * 20;
    osc.frequency.setValueAtTime(base, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(base * 1.7, ctx.currentTime + 0.07);
    osc.type = 'triangle';
    g.gain.setValueAtTime(masterVol * 0.3, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.13);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.14);
  }

  function playSixSeven(ctx) {
    [330, 392, 523, 659, 784].forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const g = ctx.createGain();
      osc.connect(g); g.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(freq, ctx.currentTime + i * 0.07);
      g.gain.setValueAtTime(masterVol * 0.45, ctx.currentTime + i * 0.07);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.07 + 0.28);
      osc.start(ctx.currentTime + i * 0.07);
      osc.stop(ctx.currentTime + i * 0.07 + 0.3);
    });
  }

  function playAchievement() {
    if (muted) return;
    const ctx = getCtx();
    [523, 659, 784, 1047].forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const g = ctx.createGain();
      osc.connect(g); g.connect(ctx.destination);
      osc.type = 'square';
      osc.frequency.setValueAtTime(freq, ctx.currentTime + i * 0.1);
      g.gain.setValueAtTime(masterVol * 0.18, ctx.currentTime + i * 0.1);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.1 + 0.2);
      osc.start(ctx.currentTime + i * 0.1);
      osc.stop(ctx.currentTime + i * 0.1 + 0.22);
    });
  }

  function playRapid() {
    if (muted) return;
    const ctx = getCtx();
    const osc = ctx.createOscillator();
    const g = ctx.createGain();
    osc.connect(g); g.connect(ctx.destination);
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(110, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(880, ctx.currentTime + 0.3);
    g.gain.setValueAtTime(masterVol * 0.25, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.35);
    osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.36);
  }

  function setVol(v) {
    masterVol = parseFloat(v);
    if (muted && masterVol > 0) { muted = false; document.getElementById('mute-btn').textContent = '🔊'; }
  }
  function toggleMute() {
    muted = !muted;
    document.getElementById('mute-btn').textContent = muted ? '🔇' : '🔊';
  }

  // --- Achievements ---
  const achievements = [
    { at: 7,    text: "67 чув? Це тільки 7 🤲" },
    { at: 67,   text: "67!!! SIXTY SEVEN!!!" },
    { at: 100,  text: "100 — але важливіше 67" },
    { at: 134,  text: "67 × 2. Брейнрот подвоєно" },
    { at: 201,  text: "67 × 3. Ти окей?" },
    { at: 420,  text: "420... але де 67?" },
    { at: 500,  text: "500 кліків. Ладоні ок?" },
    { at: 670,  text: "67 × 10. БАЗА 🔥" },
    { at: 1000, text: "1000 🤲 легенда брейнроту" },
    { at: 6700, text: "6700... ти серйозно?" },
  ];
  const floatTexts = ["6-7!", "🤲", "SIXTY", "SEVEN", "67!", "вайб", "база", "🔥"];

  // --- Click handler ---
  function handleClick(e) {
    if (e && e.type === 'touchstart') {
      touchHandled = true;
      e.preventDefault();
    } else if (e && e.type === 'click' && touchHandled) {
      touchHandled = false;
      return;
    }

    count++;
    document.getElementById('counter').textContent = count;

    // bounce
    const btn = document.getElementById('btn');
    btn.classList.remove('bounce');
    void btn.offsetWidth;
    btn.classList.add('bounce');

    // ripple
    const ripple = document.createElement('div');
    ripple.className = 'ripple';
    document.getElementById('btn-wrap').appendChild(ripple);
    setTimeout(() => ripple.remove(), 600);

    // haptic
    if (tg && tg.HapticFeedback) {
      if (count % 67 === 0) tg.HapticFeedback.notificationOccurred('success');
      else tg.HapticFeedback.impactOccurred('light');
    }

    playClick(count);
    spawnFloat();
    checkAchievement();
    updateStreak();
    updateCPS();

    if (count % 67 === 0) {
      comboCount++;
      currentStreak++;
      if (currentStreak > bestStreak) bestStreak = currentStreak;
      document.getElementById('combo-count').textContent = comboCount;
      document.getElementById('best-streak').textContent = bestStreak;
    } else {
      currentStreak = 0;
    }

    const now = Date.now();
    if (now - lastClickTime < 150) {
      rapidCount++;
      if (rapidCount === 12) { showAchievement("ТИ ШАЛЕНИЙ 🤲🤲🤲"); playRapid(); rapidCount = 0; }
    } else { rapidCount = 0; }
    lastClickTime = now;

    save();
  }

  function updateStreak() {
    const rem = 67 - (count % 67);
    const el = document.getElementById('streak');
    if (count % 67 === 0 && count > 0) {
      el.textContent = "🔥 " + comboCount + "x комбо 67!";
    } else {
      el.textContent = "до наступного 67: " + rem;
    }
  }

  function updateCPS() {
    const now = Date.now();
    clickTimes.push(now);
    clickTimes = clickTimes.filter(t => now - t < 1000);
    document.getElementById('cps').textContent = clickTimes.length;
  }

  function spawnFloat() {
    const el = document.createElement('div');
    el.className = 'float';
    const btn = document.getElementById('btn');
    const rect = btn.getBoundingClientRect();
    el.style.left = (rect.left + rect.width * 0.2 + Math.random() * rect.width * 0.6) + 'px';
    el.style.top = (rect.top - 10) + 'px';
    el.textContent = floatTexts[Math.floor(Math.random() * floatTexts.length)];
    document.getElementById('floats').appendChild(el);
    setTimeout(() => el.remove(), 1000);
  }

  function checkAchievement() {
    const ach = achievements.find(a => a.at === count);
    if (ach) { showAchievement(ach.text); playAchievement(); }
  }

  function showAchievement(text) {
    const el = document.getElementById('achievement');
    el.innerHTML = `<div class="ach-badge">${text}</div>`;
    clearTimeout(el._t);
    el._t = setTimeout(() => { el.innerHTML = ''; }, 3000);
  }
</script>
</body>
</html>
